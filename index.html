<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ForgeTech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 48px;
            line-height: 1.6;
            background: #f8f9fa;
            color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .06);
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
            background: #f0f0f0;
            border-radius: 8px;
            padding: 3px;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            transition: all .2s ease;
        }

        .lang-btn.active {
            background: #fff;
            color: #111;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .1);
        }

        .lang-btn:hover:not(.active) {
            color: #333;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            margin: 8px 0;
        }

        .muted {
            color: #666;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .content {
            transition: opacity .2s ease;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="switchLang('en')">EN</button>
            <button class="lang-btn" onclick="switchLang('zh')">中文</button>
        </div>

        <!-- English -->
        <div id="content-en" class="content">
            <h1>ForgeTech</h1>
            <p class="muted">Ronglu Technology (Haikou) Co., Ltd.</p>
            <p>We build AI-driven mobile applications and tools.</p>
            <p>Contact: <a href="mailto:contact@forgetech.site">contact@forgetech.site</a></p>
        </div>

        <!-- 中文 -->
        <div id="content-zh" class="content" style="display:none;">
            <h1>ForgeTech</h1>
            <p class="muted">熔炉科技（海口）有限公司</p>
            <p>我们专注于构建 AI 驱动的移动应用与工具。</p>
            <p>联系邮箱：<a href="mailto:contact@forgetech.site">contact@forgetech.site</a></p>
        </div>
    </div>

    <script>
        function switchLang(lang) {
            document.getElementById('content-en').style.display = lang === 'en' ? '' : 'none';
            document.getElementById('content-zh').style.display = lang === 'zh' ? '' : 'none';
            document.documentElement.lang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.trim() === (lang === 'en' ? 'EN' : '中文'));
            });
        }
    </script>
</body>

</html>
